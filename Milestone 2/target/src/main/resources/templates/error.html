<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body style="align-items: center; justify-content: center;">
    <div class="glass-card" style="text-align: center; max-width: 500px;">
        <h1 style="color: var(--danger); font-size: 3rem; margin: 0;">Oops!</h1>
        <h2>Something went wrong</h2>
        <p th:text="${errorMessage}" style="color: var(--text-secondary); margin: 1rem 0;">An unexpected error occurred.</p>
        <a href="/" class="btn btn-primary">Return to Home</a>
    </div>
</body>
</html>
