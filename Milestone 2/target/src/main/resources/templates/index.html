<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smart Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">🎓 Smart Campus</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/admin/dashboard">Admin Login</a>
        </div>
    </nav>

    <div class="container">
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div style="text-align: center; margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Discover Campus Events</h1>
            <p style="color: var(--text-secondary);">Workshops, Seminars, and more at your fingertips.</p>
        </div>

        <div class="grid">
            <div class="glass-card" th:each="event : ${events}">
                <h2 th:text="${event.title}" style="margin-top: 0;">Event Title</h2>
                <p style="color: var(--accent); font-weight: bold;" th:text="${event.type} + ' - ' + ${event.department}">Type - Dept</p>
                <p th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy, HH:mm')}">Date</p>
                <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-primary" style="margin-top: 1rem;">View Details</a>
            </div>
            
            <div th:if="${events.empty}" style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary);">
                <p>No upcoming events found.</p>
            </div>
        </div>
    </div>

    <!-- Chatbot Widget -->
    <button id="chatbot-toggle">💬</button>
    <div id="chatbot">
        <div id="chatbot-header">
            <span>Campus Assistant</span>
            <span id="chatbot-close">✖</span>
        </div>
        <div id="chatbot-messages">
            <div><strong>Bot:</strong> Hello! Ask me about events.</div>
        </div>
        <div id="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="Type a message...">
            <button class="btn btn-primary" id="chatbot-send" style="border-radius: 0;">Send</button>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('chatbot-toggle');
        const chatbot = document.getElementById('chatbot');
        const closeBtn = document.getElementById('chatbot-close');
        
        toggleBtn.addEventListener('click', () => {
            chatbot.classList.add('open');
            toggleBtn.style.display = 'none';
        });
        
        closeBtn.addEventListener('click', () => {
            chatbot.classList.remove('open');
            toggleBtn.style.display = 'block';
        });

        document.getElementById('chatbot-send').addEventListener('click', sendMessage);
        document.getElementById('chatbot-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById('chatbot-input');
            const msg = input.value.trim();
            if (!msg) return;
            
            const msgsDiv = document.getElementById('chatbot-messages');
            msgsDiv.innerHTML += `<div><strong>You:</strong> ${msg}</div>`;
            input.value = '';
            
            setTimeout(() => {
                let reply = "I'm still learning! You can check the events list on the homepage.";
                if(msg.toLowerCase().includes("register")) reply = "You can register by clicking 'View Details' on any event!";
                msgsDiv.innerHTML += `<div><strong>Bot:</strong> ${reply}</div>`;
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
